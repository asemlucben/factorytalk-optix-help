name: Scan Versions

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write   # needed to commit updated versions.json

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run version scanner
        run: python scripts/scan_versions.py

      - name: Commit updated versions.json (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/versions.json
          if git diff --cached --quiet; then
            echo "No changes to versions.json — nothing to commit."
          else
            git commit -m "chore: update versions.json [skip ci]"
            git push
          fi
